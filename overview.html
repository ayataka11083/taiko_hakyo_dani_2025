<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あやたか発狂段位2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>概要</h1>
    <h2>コンセプト</h2>
    <p>
      この段位は「未来の譜面に耐性をつける」というコンセプトで作られました。<br>
      昨今の本家譜面は、少しずつ難易度が高くなってきています。<br>
      この段位で、未来の本家譜面にそなえよう！
    </p>
    <h2>段位の内容</h2>
    <p>
      段位はすべて4曲設定です。
    </p>
    <p>
      段位の難易度設定は下記の通りです。<br>
      下記以外の段位はそれぞれ段階的に難しくなっていきます。
    </p>
    <ul>
      <li>初段：本家☆10最下位</li>
      <li>十段：本家最難関程度</li>
    </ul>
    <p>
      また、下記の段位には本家譜面を入れています
    </p>
    <ul>
      <li>初段～三段：2曲</li>
      <li>四段～八段：1曲</li>
    </ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
