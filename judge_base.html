<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あやたか発狂段位2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>合格条件の基準</h1>
  <main>
    <h2>疑似魂ゲージについて</h2>
    <p>
      本段位では、本家太鼓の達人のリザルトから魂ゲージを疑似的に再現し、<br>
      80%以上で赤合格、100%以上で金合格と判定します。
    </p>

    <h2>ゲージ計算方法</h2>
    <p>
      判定ごとに以下のポイントを加算します。
    </p>
    <ul>
      <li>良：0ポイント</li>
      <li>可：1ポイント</li>
      <li>不可：6ポイント</li>
    </ul>

    <p>
      （※実際の仕様を整数化した簡易計算）
    </p>

    <h2>クリア・入魂ライン</h2>
    <ul>
      <li>クリア：総ポイントが総音符数の78%以下</li>
      <li>入魂　：総ポイントが総音符数の47%以下</li>
    </ul>

  </main>

  <script src="script.js"></script>
</body>
</html>
